<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🎨 Art Robot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bubble-user: #7c5cff;
    --bubble-bot: #ffffff;
    --accent: #ff8a3d;
  }

  body {
    font-family: "Comic Sans MS", "Segoe UI", system-ui, sans-serif;
    background: linear-gradient(160deg, #aee7ff 0%, #d7c8ff 55%, #ffd6ec 100%);
    background-attachment: fixed;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 18px;
    background: rgba(255,255,255,0.65);
    backdrop-filter: blur(8px);
    z-index: 10;
    box-shadow: 0 2px 12px rgba(80,60,160,0.12);
    flex: 0 0 auto;
  }

  header h1 { font-size: 1.4rem; color: #4a3aa8; }

  .header-right { display: flex; align-items: center; gap: 8px; }
  .tabs { display: flex; gap: 8px; }
  .tab-btn {
    font-family: inherit;
    font-size: 1rem;
    padding: 8px 18px;
    border: none;
    border-radius: 999px;
    background: rgba(255,255,255,0.7);
    color: #4a3aa8;
    cursor: pointer;
    font-weight: bold;
    transition: transform .1s;
  }
  .tab-btn:hover { transform: scale(1.05); }
  .tab-btn.active { background: #7c5cff; color: #fff; box-shadow: 0 3px 10px rgba(124,92,255,.4); }
  #settings-btn {
    font-size: 1.2rem;
    padding: 8px 12px;
  }

  main { flex: 1; min-height: 0; display: flex; flex-direction: column; }

  /* ---------- chat layout: history left, composer right ---------- */
  #chat-layout {
    display: flex;
    flex: 1;
    min-height: 0;
    width: 100%;
  }
  #chat-view {
    flex: 1;
    min-width: 0;
    overflow-y: auto;
    padding: 16px 16px 24px;
  }

  /* messages sit in one centered column: text above its image, nudged
     right/left so it still reads like a conversation */
  .msg { display: flex; margin: 10px auto; max-width: 580px; animation: pop .25s ease-out; }
  @keyframes pop { from { transform: scale(.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .msg.user { justify-content: flex-end; padding-left: 48px; }
  .msg.bot { justify-content: flex-start; padding-right: 48px; }
  .bubble {
    max-width: 80%;
    border-radius: 22px;
    padding: 12px 16px;
    box-shadow: 0 3px 10px rgba(80,60,160,.15);
    font-size: 1.05rem;
  }
  .msg.user .bubble { background: var(--bubble-user); color: #fff; border-bottom-right-radius: 6px; }
  .msg.bot .bubble { background: var(--bubble-bot); color: #333; border-bottom-left-radius: 6px; }
  .style-chip {
    display: inline-block;
    margin-top: 6px;
    font-size: .8rem;
    background: rgba(255,255,255,.25);
    border-radius: 999px;
    padding: 2px 10px;
  }
  .bubble img {
    display: block;
    max-width: 100%;
    width: 320px;
    border-radius: 14px;
    cursor: pointer;
  }
  .redo-btn {
    font-family: inherit;
    margin-top: 8px;
    border: none;
    background: #ffe3c7;
    color: #b05a00;
    font-weight: bold;
    font-size: .95rem;
    padding: 6px 14px;
    border-radius: 999px;
    cursor: pointer;
  }
  .redo-btn:hover { background: #ffd1a3; }
  .error-bubble { background: #ffe1e1 !important; color: #a33 !important; }
  .elapsed-time {
    margin-top: 6px;
    font-size: .8rem;
    color: #8a7bd8;
    font-weight: bold;
  }

  /* loading bubble */
  .loading-wrap { width: 320px; max-width: 100%; }
  .loading-wrap canvas { width: 100%; border-radius: 14px; display: block; }
  .loading-text { text-align: center; margin-top: 8px; color: #6a5acd; font-weight: bold; min-height: 1.4em; }

  /* ---------- composer (right column) ---------- */
  .composer {
    flex: 0 0 360px;
    width: 360px;
    overflow-y: auto;
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(10px);
    box-shadow: -4px 0 20px rgba(80,60,160,.15);
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .composer-label { font-size: .9rem; color: #4a3aa8; font-weight: bold; }

  .style-strip {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .style-card {
    flex: 0 0 auto;
    font-family: inherit;
    border: 3px solid transparent;
    border-radius: 16px;
    background: #f2edff;
    padding: 6px 10px;
    text-align: center;
    cursor: pointer;
    font-size: .8rem;
    color: #4a3aa8;
    font-weight: bold;
    transition: transform .1s;
  }
  .style-card:hover { transform: translateY(-2px); }
  .style-card.selected { border-color: #7c5cff; background: #e4dbff; }
  .style-card .emoji { font-size: 1.3rem; display: block; }

  .fun-fact {
    font-size: .9rem;
    color: #5a4ab8;
    background: #f2edff;
    border-radius: 12px;
    padding: 6px 12px;
    display: none;
  }
  .fun-fact.show { display: block; }

  #prompt-input {
    width: 100%;
    font-family: inherit;
    font-size: 1.05rem;
    border: 2px solid #d3c6ff;
    border-radius: 18px;
    padding: 12px 16px;
    resize: vertical;
    outline: none;
    min-height: 100px;
    max-height: 260px;
  }
  #prompt-input:focus { border-color: #7c5cff; }
  .btn-row { display: flex; gap: 8px; }
  .btn-row #create-btn { flex: 1; }

  .btn {
    font-family: inherit;
    font-weight: bold;
    font-size: 1rem;
    border: none;
    border-radius: 18px;
    padding: 12px 18px;
    cursor: pointer;
    white-space: nowrap;
    transition: transform .1s;
  }
  .btn:hover:not(:disabled) { transform: scale(1.05); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  #surprise-btn { background: #ffe9a8; color: #8a6d00; }
  #create-btn {
    background: linear-gradient(135deg, #7c5cff, #ff5ca8);
    color: #fff;
    box-shadow: 0 4px 14px rgba(124,92,255,.45);
  }

  /* stacked layout on small screens */
  @media (max-width: 820px) {
    #chat-layout { flex-direction: column; }
    .composer {
      flex: 0 0 auto;
      width: 100%;
      max-height: 45vh;
      box-shadow: 0 -4px 20px rgba(80,60,160,.15);
    }
    .style-strip { flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 4px; }
    #prompt-input { min-height: 60px; }
  }

  /* ---------- gallery ---------- */
  #gallery-view {
    display: none;
    flex: 1;
    overflow-y: auto;
    padding: 16px 12px 40px;
  }
  .gallery-inner { max-width: 900px; margin: 0 auto; }
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
  }
  .gallery-item {
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 3px 10px rgba(80,60,160,.15);
    cursor: pointer;
    transition: transform .1s;
  }
  .gallery-item:hover { transform: scale(1.03); }
  .gallery-item img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
  .gallery-item .caption { padding: 8px 10px 2px; font-size: .85rem; color: #444; }
  .gallery-item .caption-time { padding: 0 10px 8px; font-size: .75rem; color: #8a7bd8; font-weight: bold; }
  .gallery-empty { text-align: center; color: #6a5acd; font-size: 1.1rem; padding: 40px 0; }

  /* ---------- styles page ---------- */
  #styles-view {
    display: none;
    flex: 1;
    overflow-y: auto;
    padding: 16px 12px 40px;
  }
  .styles-inner { max-width: 1000px; margin: 0 auto; }

  .example-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: rgba(255,255,255,0.75);
    border-radius: 18px;
    padding: 10px 14px;
    margin-bottom: 16px;
    box-shadow: 0 3px 10px rgba(80,60,160,.15);
    flex-wrap: wrap;
  }
  .example-nav .nav-btn {
    font-family: inherit;
    font-size: 1.1rem;
    font-weight: bold;
    border: none;
    border-radius: 999px;
    background: #7c5cff;
    color: #fff;
    padding: 8px 16px;
    cursor: pointer;
    transition: transform .1s;
  }
  .example-nav .nav-btn:hover { transform: scale(1.08); }
  .example-label { text-align: center; color: #4a3aa8; }
  .example-label .prompt-text { font-weight: bold; font-size: 1.05rem; display: block; }
  .example-label .counter { font-size: .85rem; opacity: .8; }

  .styles-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 16px;
  }
  .style-page-card {
    background: #fff;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 3px 12px rgba(80,60,160,.15);
    display: flex;
    flex-direction: column;
  }
  .style-page-card img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    display: block;
    cursor: pointer;
  }
  .style-img-placeholder {
    width: 100%;
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: repeating-linear-gradient(45deg, #f2edff, #f2edff 12px, #e9e1ff 12px, #e9e1ff 24px);
    color: #6a5acd;
    font-size: .85rem;
    text-align: center;
    padding: 12px;
  }
  .style-img-placeholder .big-emoji { font-size: 2.6rem; }
  .style-card-body { padding: 10px 14px 14px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .style-card-body h3 { color: #4a3aa8; font-size: 1.1rem; }
  .style-card-body .desc { font-size: .88rem; color: #444; flex: 1; }
  .style-card-body .fact { font-size: .8rem; color: #5a4ab8; background: #f2edff; border-radius: 10px; padding: 6px 10px; }
  .try-style-btn {
    font-family: inherit;
    font-weight: bold;
    font-size: .95rem;
    border: none;
    border-radius: 999px;
    padding: 8px 14px;
    cursor: pointer;
    background: linear-gradient(135deg, #7c5cff, #ff5ca8);
    color: #fff;
    transition: transform .1s;
  }
  .try-style-btn:hover { transform: scale(1.04); }

  /* ---------- settings modal ---------- */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(30,20,60,.6);
    z-index: 60;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal-panel {
    background: #fff;
    border-radius: 22px;
    padding: 22px 24px;
    max-width: 440px;
    width: 100%;
    box-shadow: 0 10px 50px rgba(0,0,0,.35);
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .modal-panel h2 { color: #4a3aa8; font-size: 1.3rem; }
  .modal-panel p { color: #555; font-size: .95rem; }
  #bulk-gen-btn { background: linear-gradient(135deg, #7c5cff, #ff5ca8); color: #fff; }
  .progress-track {
    width: 100%;
    height: 14px;
    border-radius: 999px;
    background: #eee6ff;
    overflow: hidden;
  }
  #progress-fill {
    height: 100%;
    width: 0%;
    border-radius: 999px;
    background: linear-gradient(90deg, #7c5cff, #ff5ca8);
    transition: width .3s;
  }
  #progress-text { font-size: .9rem; color: #5a4ab8; min-height: 1.3em; }
  #close-settings-btn { background: #f2edff; color: #4a3aa8; }

  /* ---------- lightbox ---------- */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(30,20,60,.85);
    z-index: 50;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    cursor: pointer;
  }
  #lightbox.show { display: flex; }
  #lightbox img { max-width: 92vw; max-height: 78vh; border-radius: 16px; box-shadow: 0 8px 40px rgba(0,0,0,.5); }
  #lightbox .lb-caption { color: #fff; margin-top: 14px; font-size: 1.05rem; text-align: center; max-width: 90vw; }
</style>
</head>
<body>

<header>
  <h1>🎨 Art Robot</h1>
  <div class="header-right">
    <div class="tabs">
      <button class="tab-btn active" id="tab-chat">💬 Chat</button>
      <button class="tab-btn" id="tab-gallery">🖼️ Gallery</button>
      <button class="tab-btn" id="tab-styles">🖌️ Styles</button>
    </div>
    <button class="tab-btn" id="settings-btn" title="Grown-up settings">⚙️</button>
  </div>
</header>

<main>
  <div id="chat-layout">
    <div id="chat-view"></div>
    <aside class="composer" id="composer">
      <div class="composer-label">Pick a style (or none!)</div>
      <div class="style-strip" id="style-strip"></div>
      <div class="fun-fact" id="fun-fact"></div>
      <textarea id="prompt-input" rows="4" placeholder="What should I draw? (like: a dragon eating ice cream)"></textarea>
      <div class="btn-row">
        <button class="btn" id="surprise-btn" title="Pick a random style">🎲 Surprise!</button>
        <button class="btn" id="create-btn">✨ Create!</button>
      </div>
    </aside>
  </div>

  <div id="gallery-view">
    <div class="gallery-inner">
      <div class="gallery-grid" id="gallery-grid"></div>
      <div class="gallery-empty" id="gallery-empty">No pictures yet — go make some! 🎨</div>
    </div>
  </div>

  <div id="styles-view">
    <div class="styles-inner">
      <div class="example-nav">
        <button class="nav-btn" id="example-prev">◀ Back</button>
        <div class="example-label">
          <span class="prompt-text" id="example-prompt-text"></span>
          <span class="counter" id="example-counter"></span>
        </div>
        <button class="nav-btn" id="example-next">Next ▶</button>
      </div>
      <div class="styles-grid" id="styles-grid"></div>
    </div>
  </div>
</main>

<div id="lightbox">
  <img id="lightbox-img" alt="">
  <div class="lb-caption" id="lightbox-caption"></div>
</div>

<div class="modal-overlay" id="settings-modal">
  <div class="modal-panel">
    <h2>⚙️ Grown-Up Settings</h2>
    <p id="settings-status"></p>
    <button class="btn" id="bulk-gen-btn">🎨 Generate Style Images</button>
    <div class="progress-track"><div id="progress-fill"></div></div>
    <div id="progress-text"></div>
    <button class="btn" id="close-settings-btn">Close</button>
  </div>
</div>

<script>
const chatView = document.getElementById('chat-view');
const chatLayout = document.getElementById('chat-layout');
const galleryView = document.getElementById('gallery-view');
const galleryGrid = document.getElementById('gallery-grid');
const galleryEmpty = document.getElementById('gallery-empty');
const stylesView = document.getElementById('styles-view');
const stylesGrid = document.getElementById('styles-grid');
const styleStrip = document.getElementById('style-strip');
const funFact = document.getElementById('fun-fact');
const promptInput = document.getElementById('prompt-input');
const createBtn = document.getElementById('create-btn');
const surpriseBtn = document.getElementById('surprise-btn');

let styles = [];
let messages = [];
let selectedStyle = '';
let generating = false;

let examplePrompts = [];
let styleImages = {};   // { styleName: { promptIndex: "styles/slug_0.png" } }
let exampleIndex = 0;
let bulkRunning = false;

const surprisePrompts = [
  'a dragon eating ice cream',
  'a cat astronaut floating in space',
  'a castle made of candy',
  'a robot walking a tiny dinosaur',
  'a whale flying over a rainbow city',
  'a hedgehog having a birthday party',
  'a treehouse on the moon',
  'a penguin surfing a giant wave',
  'a friendly monster baking cookies',
  'an underwater city with mermaid buses',
];

const loadingMessages = [
  'Mixing the colors… 🎨',
  'Teaching the robot to paint… 🤖',
  'Adding sparkles… ✨',
  'Painting really, really fast… 🖌️',
  'Asking the art fairies for help… 🧚',
  'Almost there… 🌈',
];

/* ---------- tabs ---------- */
document.getElementById('tab-chat').onclick = () => switchTab('chat');
document.getElementById('tab-gallery').onclick = () => switchTab('gallery');
document.getElementById('tab-styles').onclick = () => switchTab('styles');

function switchTab(tab) {
  if (location.hash !== '#' + tab) history.replaceState(null, '', '#' + tab);
  document.getElementById('tab-chat').classList.toggle('active', tab === 'chat');
  document.getElementById('tab-gallery').classList.toggle('active', tab === 'gallery');
  document.getElementById('tab-styles').classList.toggle('active', tab === 'styles');
  chatLayout.style.display = tab === 'chat' ? 'flex' : 'none';
  galleryView.style.display = tab === 'gallery' ? 'block' : 'none';
  stylesView.style.display = tab === 'styles' ? 'block' : 'none';
  if (tab === 'gallery') renderGallery();
  if (tab === 'styles') renderStylesPage();
  if (tab === 'chat') scrollToBottom();
}

/* ---------- styles ---------- */
function styleByName(name) { return styles.find(s => s.name === name); }

function renderStyleStrip() {
  styleStrip.innerHTML = '';
  for (const s of styles) {
    const card = document.createElement('button');
    card.className = 'style-card' + (selectedStyle === s.name ? ' selected' : '');
    card.innerHTML = `<span class="emoji">${s.emoji}</span>${s.name}`;
    card.onclick = () => selectStyle(selectedStyle === s.name ? '' : s.name);
    styleStrip.appendChild(card);
  }
}

function selectStyle(name) {
  selectedStyle = name;
  renderStyleStrip();
  const s = styleByName(name);
  funFact.classList.toggle('show', !!s);
  if (s) funFact.textContent = `${s.emoji} ${s.fact}`;
}

surpriseBtn.onclick = () => {
  if (!styles.length) return;
  const pick = styles[Math.floor(Math.random() * styles.length)];
  selectStyle(pick.name);
  if (!promptInput.value.trim()) {
    promptInput.value = surprisePrompts[Math.floor(Math.random() * surprisePrompts.length)];
  }
  promptInput.focus();
};

/* ---------- styles learning page ---------- */
document.getElementById('example-prev').onclick = () => stepExample(-1);
document.getElementById('example-next').onclick = () => stepExample(1);

function stepExample(delta) {
  if (!examplePrompts.length) return;
  exampleIndex = (exampleIndex + delta + examplePrompts.length) % examplePrompts.length;
  renderStylesPage();
}

function renderStylesPage() {
  if (examplePrompts.length) {
    document.getElementById('example-prompt-text').textContent = `“${examplePrompts[exampleIndex]}”`;
    document.getElementById('example-counter').textContent =
      `example ${exampleIndex + 1} of ${examplePrompts.length} — same idea, every style!`;
  }
  stylesGrid.innerHTML = '';
  for (const s of styles) {
    const card = document.createElement('div');
    card.className = 'style-page-card';

    const entry = (styleImages[s.name] || {})[exampleIndex];
    if (entry) {
      const img = document.createElement('img');
      img.src = `/images/${entry.path}?v=${Date.now()}`;
      img.alt = `${s.name} example`;
      img.loading = 'lazy';
      img.onclick = () => openLightbox({
        filename: entry.path,
        prompt: examplePrompts[exampleIndex],
        style: s.name,
      });
      card.appendChild(img);
    } else {
      const ph = document.createElement('div');
      ph.className = 'style-img-placeholder';
      ph.innerHTML = `<span class="big-emoji">${s.emoji}</span><span>No picture yet!<br>Ask a grown-up to press ⚙️ and generate the style images.</span>`;
      card.appendChild(ph);
    }

    const body = document.createElement('div');
    body.className = 'style-card-body';

    const h3 = document.createElement('h3');
    h3.textContent = `${s.emoji} ${s.name}`;
    body.appendChild(h3);

    const desc = document.createElement('div');
    desc.className = 'desc';
    desc.textContent = s.description || '';
    body.appendChild(desc);

    const fact = document.createElement('div');
    fact.className = 'fact';
    fact.textContent = `💡 ${s.fact}`;
    body.appendChild(fact);

    const tryBtn = document.createElement('button');
    tryBtn.className = 'try-style-btn';
    tryBtn.textContent = '🖌️ Try this style!';
    tryBtn.onclick = () => {
      selectStyle(s.name);
      switchTab('chat');
      promptInput.focus();
    };
    body.appendChild(tryBtn);

    card.appendChild(body);
    stylesGrid.appendChild(card);
  }
}

/* ---------- settings + bulk generation ---------- */
const settingsModal = document.getElementById('settings-modal');
const settingsStatus = document.getElementById('settings-status');
const bulkGenBtn = document.getElementById('bulk-gen-btn');
const progressFill = document.getElementById('progress-fill');
const progressText = document.getElementById('progress-text');

document.getElementById('settings-btn').onclick = () => {
  settingsModal.classList.add('show');
  updateSettingsStatus();
};
document.getElementById('close-settings-btn').onclick = () => settingsModal.classList.remove('show');
settingsModal.onclick = (e) => { if (e.target === settingsModal) settingsModal.classList.remove('show'); };

function missingStyleImages() {
  const missing = [];
  for (const s of styles) {
    for (let i = 0; i < examplePrompts.length; i++) {
      if (!(styleImages[s.name] || {})[i]) missing.push({ style: s.name, index: i });
    }
  }
  return missing;
}

function updateSettingsStatus() {
  const total = styles.length * examplePrompts.length;
  const missing = missingStyleImages().length;
  settingsStatus.textContent = missing
    ? `${total - missing} of ${total} style example pictures made. Pressing the button will generate the ${missing} missing ones (this can take a while).`
    : `All ${total} style example pictures are made! 🎉`;
  bulkGenBtn.disabled = bulkRunning || missing === 0;
}

bulkGenBtn.onclick = async () => {
  if (bulkRunning) return;
  const missing = missingStyleImages();
  if (!missing.length) return;

  bulkRunning = true;
  bulkGenBtn.disabled = true;
  bulkGenBtn.textContent = '🖌️ Painting…';
  let done = 0, failed = 0;

  for (const item of missing) {
    const promptText = examplePrompts[item.index];
    progressText.textContent = `Painting “${promptText}” in ${item.style} style… (${done + failed + 1}/${missing.length})`;
    try {
      const resp = await fetch('/api/style-images/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ style: item.style, prompt_index: item.index }),
      });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.detail || 'generation failed');
      if (!styleImages[item.style]) styleImages[item.style] = {};
      styleImages[item.style][item.index] = { path: data.filename, mtime: data.mtime || Date.now() / 1000 };
      done++;
      if (stylesView.style.display !== 'none') renderStylesPage();
    } catch (err) {
      failed++;
    }
    progressFill.style.width = `${Math.round(((done + failed) / missing.length) * 100)}%`;
  }

  progressText.textContent = failed
    ? `Done! Made ${done} pictures, but ${failed} didn't work. Try the button again for those.`
    : `All done! Made ${done} new pictures. 🎉`;
  bulkRunning = false;
  bulkGenBtn.textContent = '🎨 Generate Style Images';
  updateSettingsStatus();
  renderStylesPage();
};

/* ---------- chat rendering ---------- */
function addUserBubble(prompt, styleName) {
  const s = styleByName(styleName);
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="bubble"></div>`;
  div.querySelector('.bubble').textContent = prompt;
  if (s) {
    const chip = document.createElement('span');
    chip.className = 'style-chip';
    chip.textContent = `${s.emoji} ${s.name}`;
    div.querySelector('.bubble').appendChild(document.createElement('br'));
    div.querySelector('.bubble').appendChild(chip);
  }
  chatView.appendChild(div);
  scrollToBottom();
}

function formatElapsed(seconds) {
  if (seconds == null) return '';
  const s = Math.round(seconds);
  return s >= 60 ? `${Math.floor(s / 60)}m ${s % 60}s` : `${s}s`;
}

function addImageBubble(msg) {
  const div = document.createElement('div');
  div.className = 'msg bot';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  const img = document.createElement('img');
  img.src = `/images/${msg.filename}`;
  img.alt = msg.prompt;
  img.onclick = () => openLightbox(msg);
  bubble.appendChild(img);
  if (msg.elapsed_seconds != null) {
    const timeEl = document.createElement('div');
    timeEl.className = 'elapsed-time';
    timeEl.textContent = `⏱️ Made in ${formatElapsed(msg.elapsed_seconds)}`;
    bubble.appendChild(timeEl);
  }
  const redo = document.createElement('button');
  redo.className = 'redo-btn';
  redo.textContent = '🔁 Make another!';
  redo.onclick = () => startGeneration(msg.prompt, msg.style);
  bubble.appendChild(redo);
  div.appendChild(bubble);
  chatView.appendChild(div);
  scrollToBottom();
}

function addErrorBubble(text) {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = `<div class="bubble error-bubble"></div>`;
  div.querySelector('.bubble').textContent = '😢 ' + text;
  chatView.appendChild(div);
  scrollToBottom();
}

function scrollToBottom() {
  requestAnimationFrame(() => chatView.scrollTo({ top: chatView.scrollHeight, behavior: 'smooth' }));
}

/* ---------- particle loading animation ---------- */
function addLoadingBubble() {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = `
    <div class="bubble">
      <div class="loading-wrap">
        <canvas width="320" height="180"></canvas>
        <div class="loading-text"></div>
      </div>
    </div>`;
  chatView.appendChild(div);
  scrollToBottom();

  const canvas = div.querySelector('canvas');
  const textEl = div.querySelector('.loading-text');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  const cols = 26, rows = 12;
  let t = 0, raf = 0;

  function draw() {
    ctx.fillStyle = '#1a1440';
    ctx.fillRect(0, 0, W, H);
    for (let i = 0; i < cols; i++) {
      for (let j = 0; j < rows; j++) {
        const x = (i + 0.5) * (W / cols);
        const baseY = (j + 0.5) * (H / rows);
        const wave = Math.sin(i * 0.45 + t * 0.05 + j * 0.3) * 10
                   + Math.cos(i * 0.2 - t * 0.03) * 6;
        const y = baseY + wave;
        const hue = (i * 8 + j * 6 + t * 1.5) % 360;
        const r = 2.2 + Math.sin(i * 0.5 + j + t * 0.08) * 1.4;
        ctx.beginPath();
        ctx.arc(x, y, Math.max(r, 0.5), 0, Math.PI * 2);
        ctx.fillStyle = `hsl(${hue}, 90%, 65%)`;
        ctx.fill();
      }
    }
    t++;
    raf = requestAnimationFrame(draw);
  }
  draw();

  let msgIdx = Math.floor(Math.random() * loadingMessages.length);
  textEl.textContent = loadingMessages[msgIdx];
  const msgTimer = setInterval(() => {
    msgIdx = (msgIdx + 1) % loadingMessages.length;
    textEl.textContent = loadingMessages[msgIdx];
  }, 3500);

  return {
    remove() {
      cancelAnimationFrame(raf);
      clearInterval(msgTimer);
      div.remove();
    },
  };
}

/* ---------- generation ---------- */
async function startGeneration(prompt, styleName) {
  if (generating) return;
  prompt = prompt.trim();
  if (!prompt) { promptInput.focus(); return; }

  generating = true;
  createBtn.disabled = true;
  createBtn.textContent = '🖌️ Painting…';

  addUserBubble(prompt, styleName);
  const loader = addLoadingBubble();

  try {
    const resp = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, style: styleName }),
    });
    const data = await resp.json();
    loader.remove();
    if (!resp.ok) {
      addErrorBubble(data.detail || 'Something went wrong. Try again!');
    } else {
      messages.push(data);
      addImageBubble(data);
    }
  } catch (err) {
    loader.remove();
    addErrorBubble("I couldn't reach the art robot. Is the server running?");
  }

  generating = false;
  createBtn.disabled = false;
  createBtn.textContent = '✨ Create!';
}

createBtn.onclick = () => {
  startGeneration(promptInput.value, selectedStyle);
  if (promptInput.value.trim()) promptInput.value = '';
};

promptInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    createBtn.click();
  }
});

/* ---------- gallery ---------- */
function galleryItem(msg, captionText) {
  const item = document.createElement('div');
  item.className = 'gallery-item';
  const img = document.createElement('img');
  img.src = `/images/${msg.filename}`;
  img.alt = msg.prompt;
  img.loading = 'lazy';
  const cap = document.createElement('div');
  cap.className = 'caption';
  cap.textContent = captionText;
  item.appendChild(img);
  item.appendChild(cap);
  if (msg.elapsed_seconds != null) {
    const timeEl = document.createElement('div');
    timeEl.className = 'caption-time';
    timeEl.textContent = `⏱️ ${formatElapsed(msg.elapsed_seconds)}`;
    item.appendChild(timeEl);
  }
  item.onclick = () => openLightbox(msg);
  return item;
}

function renderGallery() {
  galleryGrid.innerHTML = '';

  // merge chat creations and style example images, newest first
  const entries = [];
  for (const msg of messages) {
    const s = styleByName(msg.style);
    entries.push({
      msg,
      caption: (s ? s.emoji + ' ' : '') + msg.prompt,
      ts: Date.parse((msg.created_at || '').replace(' ', 'T')) || 0,
    });
  }
  for (const s of styles) {
    const imgs = styleImages[s.name] || {};
    for (const idx of Object.keys(imgs)) {
      const prompt = examplePrompts[idx] || '';
      entries.push({
        msg: { filename: imgs[idx].path, prompt, style: s.name },
        caption: `${s.emoji} ${s.name} — ${prompt}`,
        ts: (imgs[idx].mtime || 0) * 1000,
      });
    }
  }
  entries.sort((a, b) => b.ts - a.ts);

  for (const e of entries) galleryGrid.appendChild(galleryItem(e.msg, e.caption));
  galleryEmpty.style.display = entries.length ? 'none' : 'block';
}

/* ---------- lightbox ---------- */
const lightbox = document.getElementById('lightbox');
function openLightbox(msg) {
  const s = styleByName(msg.style);
  document.getElementById('lightbox-img').src = `/images/${msg.filename}`;
  document.getElementById('lightbox-caption').textContent =
    msg.prompt + (s ? `  •  ${s.emoji} ${s.name}` : '');
  lightbox.classList.add('show');
}
lightbox.onclick = () => lightbox.classList.remove('show');

/* ---------- init ---------- */
async function init() {
  const [stylesResp, messagesResp, promptsResp, styleImagesResp] = await Promise.all([
    fetch('/api/styles'),
    fetch('/api/messages'),
    fetch('/api/example-prompts'),
    fetch('/api/style-images'),
  ]);
  styles = await stylesResp.json();
  messages = await messagesResp.json();
  examplePrompts = await promptsResp.json();
  styleImages = await styleImagesResp.json();
  renderStyleStrip();
  for (const msg of messages) {
    addUserBubble(msg.prompt, msg.style);
    addImageBubble(msg);
  }
  if (!messages.length) {
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.innerHTML = `<div class="bubble">Hi! I'm the Art Robot 🤖🎨 Tell me what to draw, pick a style if you want, and hit <b>✨ Create!</b></div>`;
    chatView.appendChild(div);
  }
  const hashTab = location.hash.replace('#', '');
  if (hashTab === 'gallery' || hashTab === 'styles') switchTab(hashTab);
  scrollToBottom();
}
init();
</script>
